services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      CORS_ORIGINS: http://localhost:3000
      DATA_DIR: /app/data
      SOP_DIR: /app/data/sops
      IT_DOCS_DIR: /app/data/it_docs
      TICKET_CSV: /app/data/tickets/tickets.csv
      CHROMA_PERSIST_DIR: /app/data/chroma_db
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2:3b
    depends_on:
      - ollama
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    entrypoint:
      - /bin/sh
      - -c
      - "ollama serve & sleep 5 && ollama pull llama3.2:3b && wait"
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  ollama-data:
